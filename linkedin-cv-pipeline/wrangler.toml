# Deploy config — activated in Milestone 4. Secrets are set via `wrangler secret put`,
# never committed: GRAPH_TENANT_ID, GRAPH_CLIENT_ID, GRAPH_CLIENT_SECRET, GROQ_API_KEY,
# NOTION_TOKEN, SLACK_WEBHOOK_URL. Vars: MAILBOX_ADDRESS, GROQ_MODEL,
# NOTION_CONTACTS_DB_ID (All contacts), NOTION_OPPORTUNITIES_DB_ID (Opportunities).
name = "linkedin-cv-pipeline"
main = "src/index.ts"
compatibility_date = "2026-06-01"

[triggers]
crons = ["*/5 * * * *"]

[vars]
MAILBOX_ADDRESS = "linkedinapplications@rigby.ch"
NOTION_CONTACTS_DB_ID = "3f64f533d5dd4ea8a1263607204a806a"
NOTION_OPPORTUNITIES_DB_ID = "f48d478f19c646e8aa0f17020d4495c2"
